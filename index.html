<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPQ Nurul Haq</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#009688">
    <link rel="icon" type="image/png" sizes="192x192" href="./logo-192.png">

    <style>
       /* =========================================
           1. DESAIN SPLASH SCREEN KELAS PREMIUM (ANIMATED & LARGE)
           ========================================= */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Background Gradien Mengalir (Animated) */
            background: linear-gradient(135deg, #00332a, #00695c, #004d40, #00251a);
            background-size: 300% 300%;
            animation: gradientFlow 12s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
            overflow: hidden;
        }

        /* Bias Cahaya Latar yang Berputar Halus */
        #splash-screen::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, transparent 45%);
            animation: lightRotate 25s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        /* Pola Islami Warna Emas (Gold) dengan Efek Bernapas */
        #splash-screen::after {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            /* SVG Motif Geometris dengan warna Emas (d4af37) */
            background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23d4af37" fill-opacity="0.07"%3E%3Cpath d="M30 0l21.213 8.787L60 30l-8.787 21.213L30 60 8.787 51.213 0 30l8.787-21.213L30 0zm0 15a15 15 0 1 0 0 30 15 15 0 0 0 0-30z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
            background-size: 100px 100px;
            animation: patternBreathe 8s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }

        /* Kontainer Utama untuk Elemen */
        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2; /* Di atas pola overlay */
            position: relative;
        }

        /* Kontainer Logo - Memberi ruang untuk animasi glow & orbit */
        .logo-container {
            position: relative;
            margin-bottom: 50px; /* Jarak dijauhkan agar tidak sesak dengan teks */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- DESAIN BINGKAI GANDA (DUAL GLASSMORPHISM) --- */
        
        /* Bingkai Luar (Glow Emas & Kaca Transparan) - UKURAN RAKSASA: 280px */
        .logo-frame-outer {
            position: absolute;
            width: 280px; 
            height: 280px;
            border-radius: 50%;
            background: rgba(0, 37, 26, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2), 
                        inset 0 0 30px rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.4);
            z-index: 2;
            animation: pulseOuter 4s ease-in-out infinite;
        }

        /* Bingkai Dalam (Menopang Logo) - UKURAN: 250px */
        .logo-frame-inner {
            width: 250px; 
            height: 250px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 
                        inset 0 0 15px rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 3; /* Berada di atas bingkai luar */
            overflow: hidden; /* Memastikan logo yang 'tumpah' terpotong rapi */
        }

        /* Logo Asli di Dalam Bingkai Dalam - UKURAN: 260px (Sengaja lebih besar untuk efek penuh) */
        .splash-logo {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            object-fit: cover; /* Diubah ke cover agar memenuhi seluruh lingkaran */
            /* Animasi melayang halus */
            animation: floatSlow 6s ease-in-out infinite;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6)) contrast(1.1); /* Kontras dinaikkan sedikit agar warna lebih hidup */
        }

        /* --- ANIMASI ORBIT --- */

        /* Garis Orbit - UKURAN: 310px (Melingkari bingkai luar) */
        .loader-orbit {
            position: absolute;
            /* Memusatkan orbit secara absolut */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 310px; 
            height: 310px;
            border-radius: 50%;
            border: 2px solid transparent;
            /* Warna ekor orbit: Emas terang ke transparan */
            border-top-color: rgba(212, 175, 55, 0.8);
            border-right-color: rgba(212, 175, 55, 0.2);
            z-index: 4; /* Berada paling atas dari susunan cincin */
            /* Perhatikan: Animasi rotasi sekarang didefinisikan berbeda untuk menjaga centering */
            animation: orbitSpin 1.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
        }

        /* Titik Emas Bercahaya (The Comet) */
        .loader-orbit::before {
            content: '';
            position: absolute;
            /* Koordinat ini mengunci titik di lintasan lingkaran 310px */
            top: 38px; 
            right: 38px; 
            width: 14px; /* Sedikit lebih besar */
            height: 14px;
            background-color: #ffe066; /* Kuning emas sangat terang */
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 224, 102, 1), 
                        0 0 40px rgba(212, 175, 55, 0.8),
                        0 0 60px rgba(212, 175, 55, 0.4);
        }

        /* Teks Pemuat yang Menginspirasi & Elegan */
        .splash-text {
            color: #ffffff;
            margin-top: 10px;
            font-size: 13px; /* Ukuran proporsional dengan logo raksasa */
            font-family: 'Montserrat', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 600;
            letter-spacing: 6px; /* Spasi huruf lebar untuk kesan elegan */
            text-transform: uppercase;
            opacity: 0.9;
            /* Efek Shimmer (Kilau menyapu teks) */
            background: linear-gradient(90deg, rgba(255,255,255,0.5) 0%, #ffffff 50%, rgba(255,255,255,0.5) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmerText 3s linear infinite;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* --- KUMPULAN KEYFRAMES ANIMASI --- */

        /* 1. Animasi Latar Belakang Gradien */
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Animasi Cahaya Memutar di Latar */
        @keyframes lightRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 3. Animasi Pola Islami Bernapas */
        @keyframes patternBreathe {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        
        /* 4. Animasi Logo Melayang Halus */
        @keyframes floatSlow {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); } /* Mengambang naik sambil sedikit membesar */
            100% { transform: translateY(0px) scale(1); }
        }

        /* 5. Animasi Denyut Bingkai Luar */
        @keyframes pulseOuter {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(212, 175, 55, 0.2), inset 0 0 30px rgba(212, 175, 55, 0.15); }
            50% { transform: scale(1.03); box-shadow: 0 0 60px rgba(212, 175, 55, 0.4), inset 0 0 40px rgba(212, 175, 55, 0.25); }
        }

        /* 6. Animasi Putaran Orbit (Khusus untuk posisi terpusat) */
        @keyframes orbitSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 7. Animasi Teks Shimmer */
        @keyframes shimmerText {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        /* Class untuk menyembunyikan splash screen (dikontrol oleh JS) */
        .fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* =========================================
           2. PENGATURAN DASAR & IFRAME (PWA)
           ========================================= */
        body, html {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            overflow: hidden; 
            background-color: #f4fdf8; /* Warna fallback */
            font-family: sans-serif;
        }
        
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none; 
            display: block;
            z-index: 1;
        }

        /* =========================================
           3. BANNER INSTALL
           ========================================= */
        #installBanner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 10000;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.3);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: translateY(150%) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .banner-kiri {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .banner-kiri img {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,150,136,0.2);
        }

        .banner-teks h6 {
            margin: 0;
            font-size: 1.1rem;
            color: #1a202c;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .banner-teks small {
            color: #718096;
            font-size: 0.85rem;
        }

        #btnInstall {
            background: #009688;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #btnInstall:active {
            transform: scale(0.9);
        }

        #btnTutupBanner {
            position: absolute;
            top: -10px;
            right: 10px;
            background: #ff5f57;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo-container">
                <div class="loader-orbit"></div> 
                <div class="logo-frame">
                    <img src="./logo-192.png" alt="Logo TPQ" class="splash-logo">
                </div>
            </div>
            <p class="splash-text">METODE QUR'ANI SIDOGIRI</p>
        </div>
    </div>
    
    <iframe id="appFrame" allow="camera; microphone; fullscreen"></iframe>

    <div id="installBanner">
        <button id="btnTutupBanner" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
        <div class="banner-kiri">
            <img src="./logo-192.png" alt="Logo TPQ">
            <div class="banner-teks">
                <h6>TPQ Nurul Haq</h6>
                <small>TAMAN PENDIDIKAN AL-QUR'AN</small>
            </div>
        </div>
        <button id="btnInstall">PASANG</button>
    </div>
    
    <script>
       // 1. Setting OneSignal (DIMATIKAN SEMENTARA AGAR PWA FOKUS)
        /*
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "26d9af55-8916-405f-9c08-fd6910730bc5",
                serviceWorkerPath: "/TPQ/sw.js", 
                serviceWorkerParam: { scope: "/TPQ/" },
                notifyButton: { enable: true }, 
            });
        });
        */

        // 2. Injeksi Google Script Iframe
        const gasUrl = "https://script.google.com/macros/s/AKfycbxUkj-y3mppSeFACvJ-MVCELHw7P1VyFaCabxpj8q16UIL-SQaKO8ReoW23OuyuOGaH/exec";
        const params = window.location.search; 
        const waktuSekarang = new Date().getTime(); 
        const finalUrl = gasUrl + (params ? params + "&" : "?") + "refresh=" + waktuSekarang;
        document.getElementById('appFrame').src = finalUrl;

        // 3. Service Worker PWA Dasar
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('Service Worker gagal:', err));
            });
        }

        // 4. LOGIKA BANNER INSTALL OTOMATIS
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const btnInstall = document.getElementById('btnInstall');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'flex';
        });

        btnInstall.addEventListener('click', async () => {
            installBanner.style.display = 'none';
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`Pengguna memilih: ${outcome}`);
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
            deferredPrompt = null;
            console.log('Aplikasi TPQ berhasil diinstal di HP!');
        });

        // 5. Fungsi Penutup Splash Screen Mulus
        const appFrame = document.getElementById('appFrame');
        const splash = document.getElementById('splash-screen');

        appFrame.onload = function() {
            // Memberi waktu tambahan 1.5 detik agar animasi loading sempat dinikmati pengguna
            setTimeout(() => {
                splash.classList.add('fade-out');
            }, 1500); 
        };
    </script>
</body>
</html>
