<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#009688">
    <link rel="apple-touch-icon" href="https://drive.google.com/thumbnail?id=1CsPekD3P5yxg6h2oedLvAcU_Qhxnjm43&sz=w192">
    <title>TPQ Nurul Haq</title>
    
    <link rel="icon" type="image/jpeg" sizes="192x192" href="https://raw.githubusercontent.com/nurul-haq/TPQ/main/Logo%20192.png">
    <link rel="icon" type="image/jpeg" sizes="512x512" href="https://raw.githubusercontent.com/nurul-haq/TPQ/main/Logo%20512.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/nurul-haq/TPQ/main/Logo%20512.png">
    <meta name="theme-color" content="#064e3b">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Menghilangkan scrollbar ganda */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbxUkj-y3mppSeFACvJ-MVCELHw7P1VyFaCabxpj8q16UIL-SQaKO8ReoW23OuyuOGaH/exec"></iframe>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => console.log('Service Worker berhasil didaftarkan!', reg.scope))
            .catch((err) => console.log('Service Worker gagal didaftarkan:', err));
        });
      }
    </script>
    
</body>
</html>
