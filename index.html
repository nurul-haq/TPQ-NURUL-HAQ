<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPQ Nurul Haq</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#009688">
    <link rel="icon" type="image/png" sizes="192x192" href="./Logo%20192.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #009688; /* Warna loading awal */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    
    <iframe id="appFrame" allow="camera; microphone; fullscreen" sandbox="allow-scripts allow-top-navigation allow-same-origin allow-forms allow-popups"></iframe>

    <script>
      // 1. Injeksi Link Google Script & Penghancur Cache
      const gasUrl = "https://script.google.com/macros/s/AKfycbxUkj-y3mppSeFACvJ-MVCELHw7P1VyFaCabxpj8q16UIL-SQaKO8ReoW23OuyuOGaH/exec";
      const params = window.location.search; 
      const waktuSekarang = new Date().getTime(); 
      const finalUrl = gasUrl + (params ? params + "&" : "?") + "refresh=" + waktuSekarang;
      
      document.getElementById('appFrame').src = finalUrl;

      // 2. Pendaftaran Service Worker PWA Dasar
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => console.log('Service Worker gagal:', err));
        });
      }
    </script>
</body>
</html>
