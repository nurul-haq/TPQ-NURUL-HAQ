<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPQ Nurul Haq</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#009688">
    <link rel="icon" type="image/png" sizes="192x192" href="./logo-192.png">

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    
    <style>
        /* =========================================
           1. DESAIN SPLASH SCREEN MODERN
           ========================================= */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Mengganti warna flat dengan gradient yang elegan */
            background: linear-gradient(135deg, #009688 0%, #004d40 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            /* Transisi saat hilang dibuat lebih mulus */
            transition: opacity 0.6s cubic-bezier(0.8, 0, 0.2, 1), visibility 0.6s;
        }

        /* Animasi Melayang (Floating) untuk Logo */
        .splash-logo {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            /* Latar belakang putih agar logo menonjol */
            background-color: #ffffff;
            padding: 8px; /* Memberi ruang bernapas untuk logo */
            animation: float 3s ease-in-out infinite;
            object-fit: contain;
        }

        /* Loader Modern (Gaya Titik Bouncing) */
        .modern-loader {
            margin-top: 35px;
            display: flex;
            gap: 8px;
        }

        .modern-loader span {
            width: 10px;
            height: 10px;
            background-color: #ffffff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .modern-loader span:nth-child(1) { animation-delay: -0.32s; }
        .modern-loader span:nth-child(2) { animation-delay: -0.16s; }

        /* Teks Loading yang Elegan */
        .splash-text {
            color: rgba(255, 255, 255, 0.9);
            margin-top: 20px;
            font-size: 13px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulse-opacity 2s infinite ease-in-out;
        }

        /* --- KEYFRAMES UNTUK ANIMASI --- */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse-opacity {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Class untuk menghilangkan splash */
        .fade-out {
            opacity: 0;
            visibility: hidden;
        }
        
        /* =========================================
           2. PENGATURAN DASAR & IFRAME
           ========================================= */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #009688;
            font-family: sans-serif;
        }
        
        iframe {
            width: 100%; height: 100%; border: none; display: block;
        }

        /* =========================================
           3. BANNER INSTALL
           ========================================= */
        #installBanner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 10000;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.3);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: translateY(150%) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .banner-kiri {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .banner-kiri img {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,150,136,0.2);
        }

        .banner-teks h6 {
            margin: 0;
            font-size: 1.1rem;
            color: #1a202c;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .banner-teks small {
            color: #718096;
            font-size: 0.85rem;
        }

        #btnInstall {
            background: #009688;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #btnInstall:active {
            transform: scale(0.9);
        }

        #btnTutupBanner {
            position: absolute;
            top: -10px;
            right: 10px;
            background: #ff5f57;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="./logo-192.png" alt="Logo TPQ" class="splash-logo">
        <div class="modern-loader">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <p class="splash-text">MEMUAT DATA</p>
    </div>
    
    <iframe id="appFrame" allow="camera; microphone; fullscreen" sandbox="allow-scripts allow-top-navigation allow-same-origin allow-forms allow-popups"></iframe>

    <div id="installBanner">
        <button id="btnTutupBanner" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
        <div class="banner-kiri">
            <img src="./logo-192.png" alt="Logo TPQ">
            <div class="banner-teks">
                <h6>TPQ Nurul Haq</h6>
                <small>TAMAN PENDIDIKAN AL-QUR'AN</small>
            </div>
        </div>
        <button id="btnInstall">PASANG</button>
    </div>
    
    <script>
       // 1. Setting OneSignal (DIMATIKAN SEMENTARA AGAR PWA FOKUS)
        /*
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "26d9af55-8916-405f-9c08-fd6910730bc5",
                serviceWorkerPath: "/TPQ/sw.js", 
                serviceWorkerParam: { scope: "/TPQ/" },
                notifyButton: { enable: true }, 
            });
        });
        */

        // 2. Injeksi Google Script Iframe
        const gasUrl = "https://script.google.com/macros/s/AKfycbxUkj-y3mppSeFACvJ-MVCELHw7P1VyFaCabxpj8q16UIL-SQaKO8ReoW23OuyuOGaH/exec";
        const params = window.location.search; 
        const waktuSekarang = new Date().getTime(); 
        const finalUrl = gasUrl + (params ? params + "&" : "?") + "refresh=" + waktuSekarang;
        document.getElementById('appFrame').src = finalUrl;

        // 3. Service Worker PWA Dasar
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('Service Worker gagal:', err));
            });
        }

        // 4. LOGIKA BANNER INSTALL OTOMATIS
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const btnInstall = document.getElementById('btnInstall');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'flex';
        });

        btnInstall.addEventListener('click', async () => {
            installBanner.style.display = 'none';
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`Pengguna memilih: ${outcome}`);
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
            deferredPrompt = null;
            console.log('Aplikasi TPQ berhasil diinstal di HP!');
        });

        // 5. Fungsi Penutup Splash Screen Mulus
        const appFrame = document.getElementById('appFrame');
        const splash = document.getElementById('splash-screen');

        appFrame.onload = function() {
            // Memberi waktu tambahan 1.5 detik agar animasi loading sempat dinikmati pengguna
            setTimeout(() => {
                splash.classList.add('fade-out');
            }, 1500); 
        };
    </script>
</body>
</html>
